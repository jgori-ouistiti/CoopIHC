name: sphinx

on:
  push:
  pull_request:

env:
  DEFAULT_BRANCH: "main"
  #SPHINXOPTS: "-W --keep-going -T"
  # ^-- If these SPHINXOPTS are enabled, then be strict about the builds and fail on any warnings

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Install LaTeX for sphinxcontrib-tikz
      - name: Install LaTeX and Ghostscript
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra ghostscript pdf2svg pnmtopng

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Install uv
      - name: Install uv
        run: pip install uv

      # Install dependencies from pyproject
      - name: Install project dependencies
        run: |
          uv sync --group dev
          uv pip install -e .

      - name: Debug info
        run: |
          python -V
          uv pip list

      - name: Build docs
        run: |
          uv run sphinx-build -b html docs docs/_build/html

      - uses: ammaraskar/sphinx-problem-matcher@master

      # Prepare gh-pages directory
      - name: Clone old gh-pages
        if: ${{ github.event_name == 'push' }}
        run: |
          git fetch
          ( git branch gh-pages remotes/origin/gh-pages && git clone . --branch=gh-pages _gh-pages/ ) || mkdir _gh-pages
          rm -rf _gh-pages/.git/
          mkdir -p _gh-pages/branch/
       # If a push and default branch, copy build to _gh-pages/ as the "main"
      # deployment.
      - name: Copy new build (default branch)
        if: |
          contains(github.event_name, 'push') &&
          contains(github.ref, env.DEFAULT_BRANCH)
        run: |
          find _gh-pages/ -mindepth 1 ! -path '_gh-pages/branch*' -delete
          rsync -a docs/_build/html/ _gh-pages/
      # If a push and not on default branch, then copy the build to
      # _gh-pages/branch/$brname (transforming '/' into '--')
      - name: Copy new build (branch)
        if: |
          contains(github.event_name, 'push') &&
          !contains(github.ref, env.DEFAULT_BRANCH)
        run: |
          brname="${{github.ref}}"
          brname="${brname##refs/heads/}"
          brdir=${brname//\//--}
          rm -rf _gh-pages/branch/${brdir}
          rsync -a docs/_build/html/ _gh-pages/branch/${brdir}
        # Go through each branch in _gh-pages/branch/, if it's not a
      # ref, then delete it.
      - name: Delete old feature branches
        if: ${{ github.event_name == 'push' }}
        run: |
          for brdir in `ls _gh-pages/branch/` ; do
              brname=${brdir//--/\/}
              if ! git show-ref remotes/origin/$brname ; then
                  rm -r _gh-pages/branch/$brdir/
              fi
          done

      - name: Add .nojekyll
        if: ${{ github.event_name == 'push' }}
        run: touch _gh-pages/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.event_name == 'push' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _gh-pages/
          force_orphan: true